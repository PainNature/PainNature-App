<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pain Nature — Matières premières</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b3a1f">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
.topbar{
  background:var(--wheat); color:#fff; padding:0 1.2rem; height:54px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.2); position:sticky; top:0; z-index:10;
}
.topbar .marque{font-weight:800; font-size:1rem; display:flex; align-items:center; gap:.6rem;}
.topbar .retour{color:#fff; text-decoration:none; font-size:1.3rem; opacity:.85;}
.topbar .deco{background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); color:#fff; padding:6px 13px; border-radius:var(--r); font-size:.82rem; font-weight:600; cursor:pointer;}
main{max-width:760px; margin:1.2rem auto 3rem; padding:0 1.2rem;}

.note-info{font-size:.82rem; color:var(--text-light); margin-bottom:1rem; font-style:italic; background:var(--surface2); padding:.6rem .8rem; border-radius:var(--r);}

.btn-nouvelle{width:100%; padding:13px; margin-bottom:1rem;}

table{width:100%; border-collapse:collapse;}
th{text-align:left; font-size:.7rem; text-transform:uppercase; letter-spacing:.04em; color:var(--text-light); padding:10px 12px; border-bottom:2px solid var(--border); font-family:var(--mono);}
td{padding:9px 12px; border-bottom:1px solid var(--border); font-size:.88rem;}
tr:last-child td{border-bottom:none;}
.bio-tag{font-size:.68rem; background:var(--green-light); color:var(--green); padding:1px 7px; border-radius:9px; margin-left:5px;}
.prix-badge{font-size:.7rem; padding:2px 9px; border-radius:10px; font-family:var(--mono); font-weight:700;}
.prix-ok{background:var(--green-light); color:var(--green);}
.prix-manquant{background:var(--red-light); color:var(--red);}

.vide{text-align:center; padding:2rem; color:var(--text-light); font-size:.9rem;}

.overlay{display:none; position:fixed; inset:0; background:rgba(20,12,6,.55); align-items:center; justify-content:center; z-index:50; padding:1.2rem;}
.overlay.visible{display:flex;}
.modale{background:var(--surface); border-radius:var(--r-lg); padding:1.6rem; width:100%; max-width:420px; box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modale h3{color:var(--wheat); margin-bottom:1.1rem; font-size:1.1rem;}
.field{margin-bottom:1rem;}
.field label{display:block; font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--text-light); margin-bottom:.4rem; font-family:var(--mono);}
.field input{width:100%; padding:11px 12px; font-size:.95rem; border:2px solid var(--border-strong); border-radius:var(--r); background:var(--surface2); color:var(--text);}
.field input:focus{outline:none; border-color:var(--wheat); background:#fff;}
.field-checkbox{display:flex; align-items:center; gap:8px;}
.field-checkbox input{width:18px; height:18px;}
.modale-actions{display:flex; gap:10px; margin-top:1.4rem;}
.modale-actions .btn{flex:1;}
.msg-erreur-modale{display:none; background:var(--red-light); color:var(--red); padding:.6rem .8rem; border-radius:var(--r); font-size:.82rem; font-weight:600; margin-bottom:.9rem;}
.msg-erreur-modale.visible{display:block;}
.note-prix-gerant{font-size:.78rem; color:var(--text-light); margin-top:.3rem;}
</style>
</head>
<body>

<div class="topbar">
  <span class="marque"><a href="accueil.html" class="retour">←</a> 🌾 MATIÈRES PREMIÈRES</span>
  <button class="deco" onclick="deconnexion()">Déconnexion</button>
</div>

<main>
  <p class="note-info" id="note-role"></p>

  <button class="btn btn-primary btn-nouvelle" onclick="ouvrirModaleAjout()">+ Ajouter une matière première</button>

  <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;">
    <select id="filtre-categorie" onchange="chargerListe()" style="padding:8px 10px; border:1.5px solid var(--border-strong); border-radius:var(--r); font-size:.85rem; background:#fff; font-weight:600;">
      <option value="">Toutes les catégories</option>
    </select>
    <select id="filtre-metier" onchange="chargerListe()" style="padding:8px 10px; border:1.5px solid var(--border-strong); border-radius:var(--r); font-size:.85rem; background:#fff; font-weight:600;">
      <option value="">Tous les métiers</option>
      <option value="B">Boulangerie</option>
      <option value="P">Pâtisserie</option>
      <option value="V">Viennoiserie</option>
      <option value="GV">Gâteaux de voyage</option>
      <option value="T">Traiteur</option>
    </select>
  </div>

  <div class="card">
    <table>
      <thead><tr><th>Nom</th><th>Catégorie</th><th>Métiers</th><th>Statut</th></tr></thead>
      <tbody id="corps-mp"><tr><td colspan="4" class="vide">Chargement…</td></tr></tbody>
    </table>
  </div>
</main>

<div class="overlay" id="overlay-ajout">
  <div class="modale">
    <h3 id="titre-modale-mp">Nouvelle matière première</h3>
    <div class="msg-erreur-modale" id="erreur-ajout"></div>
    <form onsubmit="return false;">
      <input type="hidden" id="add-id">
      <div class="field"><label>Nom</label><input type="text" id="add-nom" required placeholder="ex : Farine T80 Bio"></div>
      <div class="field"><label>Fournisseur</label><input type="text" id="add-fournisseur" placeholder="ex : Coup de Vague"></div>
      <div class="field"><label>Catégorie</label>
        <select id="add-categorie" style="width:100%; padding:10px 12px; border:1.5px solid var(--border-strong); border-radius:var(--r); background:#fff;"></select>
      </div>
      <div class="field field-checkbox"><input type="checkbox" id="add-bio"><label style="margin:0;">Matière biologique</label></div>
      <div class="field">
        <label>Métiers concernés</label>
        <div style="display:flex; flex-direction:column; gap:6px; margin-top:4px;">
          <label style="display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600; cursor:pointer;"><input type="checkbox" id="add-metier-b" style="width:18px;height:18px;"> Boulangerie</label>
          <label style="display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600; cursor:pointer;"><input type="checkbox" id="add-metier-p" style="width:18px;height:18px;"> Pâtisserie</label>
          <label style="display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600; cursor:pointer;"><input type="checkbox" id="add-metier-v" style="width:18px;height:18px;"> Viennoiserie</label>
          <label style="display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600; cursor:pointer;"><input type="checkbox" id="add-metier-gv" style="width:18px;height:18px;"> Gâteaux de voyage</label>
          <label style="display:flex; align-items:center; gap:8px; font-size:.85rem; font-weight:600; cursor:pointer;"><input type="checkbox" id="add-metier-t" style="width:18px;height:18px;"> Traiteur</label>
        </div>
      </div>
      <p class="note-prix-gerant">💡 Le prix sera renseigné par le gérant depuis l'écran Gestion.</p>
    </form>
    <div class="modale-actions">
      <button class="btn btn-ghost" onclick="fermerModaleAjout()">Annuler</button>
      <button class="btn btn-primary" id="btn-confirmer-ajout" onclick="confirmerAjout()">Ajouter</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script>
let profilCourant = null;

const labelsMetier = { B: 'Boulangerie', P: 'Pâtisserie', V: 'Viennoiserie', GV: 'Gâteaux de voyage', T: 'Traiteur' };
const labelsCategorie = {
  farines: 'Farines', levains_ferments: 'Levains & ferments',
  sel_sucres_epices: 'Sel, sucres et épices', matieres_grasses: 'Matières grasses',
  liquides_oeufs: 'Liquides et œufs', graines_fruits_secs: 'Graines et fruits secs',
  fruits_legumes: 'Fruits & légumes', chocolat_cacao: 'Chocolat & cacao',
  emballage_consommables: 'Emballage & consommables', autres_preparations: 'Autres / Préparations', viandes_fromages: 'Viandes & Fromages'
};

function remplirSelectsCategorie() {
  const optionsHtml = Object.entries(labelsCategorie).map(([val, lbl]) => `<option value="${val}">${lbl}</option>`).join('');
  document.getElementById('filtre-categorie').innerHTML = '<option value="">Toutes les catégories</option>' + optionsHtml;
  document.getElementById('add-categorie').innerHTML = '<option value="">—</option>' + optionsHtml;
}

async function chargerListe() {
  const metierFiltre = document.getElementById('filtre-metier')?.value;
  const categorieFiltre = document.getElementById('filtre-categorie')?.value;

  let requete = sb.from('matieres_premieres').select('id, nom, fournisseur, bio, prix_ht_kg, metiers, categorie').order('categorie').order('nom');
  if (metierFiltre) requete = requete.contains('metiers', [metierFiltre]);
  if (categorieFiltre) requete = requete.eq('categorie', categorieFiltre);

  const { data, error } = await requete;
  const corps = document.getElementById('corps-mp');
  if (error) { corps.innerHTML = `<tr><td colspan="4" class="vide">Erreur : ${error.message}</td></tr>`; return; }
  if (!data || data.length === 0) { corps.innerHTML = '<tr><td colspan="4" class="vide">Aucune matière première pour ce filtre.</td></tr>'; return; }

  corps.innerHTML = data.map(mp => `
    <tr style="cursor:pointer;" onclick='ouvrirModaleEdition(${JSON.stringify(mp).replace(/'/g, "&apos;")})'>
      <td>${mp.nom}${mp.bio ? '<span class="bio-tag">BIO</span>' : ''}</td>
      <td style="font-size:.78rem; color:var(--text-light);">${labelsCategorie[mp.categorie] || '—'}</td>
      <td style="font-size:.78rem; color:var(--text-light);">${(mp.metiers || []).map(m => labelsMetier[m] || m).join(', ') || '—'}</td>
      <td>
        ${mp.prix_ht_kg > 0
          ? `<span class="prix-badge prix-ok">${Number(mp.prix_ht_kg).toFixed(4)} €/kg</span>`
          : `<span class="prix-badge prix-manquant">Prix à renseigner</span>`}
      </td>
    </tr>
  `).join('');
}

function remplirFormulaire(mp) {
  document.getElementById('add-id').value = mp?.id || '';
  document.getElementById('add-nom').value = mp?.nom || '';
  document.getElementById('add-fournisseur').value = mp?.fournisseur || '';
  document.getElementById('add-categorie').value = mp?.categorie || '';
  document.getElementById('add-bio').checked = mp?.bio || false;
  const metiers = mp?.metiers || [];
  document.getElementById('add-metier-b').checked = metiers.includes('B');
  document.getElementById('add-metier-p').checked = metiers.includes('P');
  document.getElementById('add-metier-v').checked = metiers.includes('V');
  document.getElementById('add-metier-gv').checked = metiers.includes('GV');
  document.getElementById('add-metier-t').checked = metiers.includes('T');
}

function ouvrirModaleAjout() {
  document.getElementById('erreur-ajout').classList.remove('visible');
  document.getElementById('titre-modale-mp').textContent = 'Nouvelle matière première';
  document.getElementById('btn-confirmer-ajout').textContent = 'Ajouter';
  remplirFormulaire(null);
  document.getElementById('overlay-ajout').classList.add('visible');
}

function ouvrirModaleEdition(mp) {
  document.getElementById('erreur-ajout').classList.remove('visible');
  document.getElementById('titre-modale-mp').textContent = 'Modifier la matière première';
  document.getElementById('btn-confirmer-ajout').textContent = 'Enregistrer';
  remplirFormulaire(mp);
  document.getElementById('overlay-ajout').classList.add('visible');
}

function fermerModaleAjout() {
  document.getElementById('overlay-ajout').classList.remove('visible');
}

async function confirmerAjout() {
  const id = document.getElementById('add-id').value;
  const nom = document.getElementById('add-nom').value.trim();
  const fournisseur = document.getElementById('add-fournisseur').value.trim();
  const categorie = document.getElementById('add-categorie').value || null;
  const bio = document.getElementById('add-bio').checked;
  const erreur = document.getElementById('erreur-ajout');
  const btn = document.getElementById('btn-confirmer-ajout');

  const metiers = [];
  if (document.getElementById('add-metier-b').checked) metiers.push('B');
  if (document.getElementById('add-metier-p').checked) metiers.push('P');
  if (document.getElementById('add-metier-v').checked) metiers.push('V');
  if (document.getElementById('add-metier-gv').checked) metiers.push('GV');
  if (document.getElementById('add-metier-t').checked) metiers.push('T');

  if (!nom) {
    erreur.textContent = 'Le nom est obligatoire.';
    erreur.classList.add('visible');
    return;
  }

  btn.disabled = true; btn.textContent = id ? 'Enregistrement…' : 'Ajout…';

  let error;
  if (id) {
    // Modification d'une matière existante : catégorie, métiers, bio,
    // fournisseur sont modifiables par l'équipe métier — le PRIX reste
    // protégé séparément (RLS empêche son écriture hors gérant).
    ({ error } = await sb.from('matieres_premieres').update({
      nom, fournisseur, categorie, bio, metiers
    }).eq('id', id));
  } else {
    // Création via la fonction serveur qui gère les droits pour tous les
    // rôles et enregistre maintenant la catégorie en une seule opération.
    ({ error } = await sb.rpc('creer_matiere_premiere_sans_prix', {
      p_nom: nom, p_fournisseur: fournisseur, p_bio: bio,
      p_metiers: metiers, p_categorie: categorie || null
    }));
  }

  btn.disabled = false; btn.textContent = id ? 'Enregistrer' : 'Ajouter';

  if (error) { erreur.textContent = error.message; erreur.classList.add('visible'); return; }

  fermerModaleAjout();
  await chargerListe();
}

(async () => {
  profilCourant = await exigerRole(['gerant','boulanger','patissier']);
  if (!profilCourant) return;

  document.getElementById('note-role').textContent = profilCourant.role === 'gerant'
    ? "En tant que gérant, vous seul pouvez modifier les prix (depuis l'écran Gestion). Cliquez sur une ligne pour modifier catégorie, métiers ou bio."
    : "Vous pouvez consulter les prix, ajouter des matières et modifier catégorie/métiers/bio. Seul le gérant peut modifier un prix existant.";

  remplirSelectsCategorie();
  await chargerListe();
})();
</script>
</body>
</html>
