<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pain Nature — Production</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#5a420a; --amber-light:#faf0d0;
}
body{font-size:13px;}
.topbar{
  background:var(--wheat); color:#fff; padding:8px 1rem; min-height:50px;
  display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; row-gap:8px;
  position:sticky; top:0; z-index:200; box-shadow:0 2px 6px rgba(0,0,0,.25);
}
.topbar .marque{font-weight:800; font-size:15px; display:flex; align-items:center; gap:.6rem;}
.topbar .retour{color:#fff; text-decoration:none; font-size:1.2rem; opacity:.85;}
.topbar-right{display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:flex-end;}
.btn-tab{background:rgba(255,255,255,.12); color:#fff; border:1px solid rgba(255,255,255,.25); border-radius:var(--r); padding:5px 11px; font-size:12px; font-weight:600; cursor:pointer;}
.btn-tab.active{background:rgba(255,255,255,.32); font-weight:700; border-color:rgba(255,255,255,.5);}
.date-input{background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3); border-radius:var(--r); padding:4px 9px; font-family:var(--mono); font-size:12px; color:#fff;}
.date-input::-webkit-calendar-picker-indicator{filter:invert(1);}

main{max-width:1200px; margin:0 auto; padding:.75rem 1rem 3rem;}

.qtotals{display:grid; grid-template-columns:repeat(auto-fit,minmax(110px,1fr)); gap:7px; margin-bottom:.75rem;}

.filtre-metier-bar{display:flex; gap:6px; margin-bottom:.75rem; flex-wrap:wrap;}
.filtre-metier-btn{
  flex:1; min-width:110px; padding:9px 10px; border:1.5px solid var(--border-strong);
  border-radius:var(--r-lg); background:var(--surface); font-size:11px; font-weight:700;
  color:var(--text-muted); cursor:pointer; text-align:center;
}
.filtre-metier-btn.active{background:var(--wheat); color:#fff; border-color:var(--wheat);}
.filtre-metier-btn .count{
  display:inline-block; margin-left:4px; font-family:var(--mono); font-size:9.5px;
  opacity:.8;
}
.qtot{background:var(--surface); border:2px solid var(--border); border-radius:var(--r-lg); padding:.5rem .6rem; text-align:center;}
.qtot .ql{font-family:var(--mono); font-size:9px; letter-spacing:.07em; text-transform:uppercase; color:#555; font-weight:700;}
.qtot .qv{font-family:var(--mono); font-size:18px; font-weight:800; color:var(--wheat);}
.qtot .qu{font-size:9px; color:#555; font-family:var(--mono); font-weight:600;}

.levains-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:.75rem;}
.levain-card{background:var(--surface); border:2px solid var(--border); border-radius:var(--r-lg); overflow:hidden;}
.levain-head{padding:6px 10px; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:space-between;}
.lh-liq{background:var(--blue-light); color:var(--blue); border-bottom:2px solid #b0ccec;}
.lh-eng{background:var(--amber-light); color:var(--amber); border-bottom:2px solid #d8c070;}
.lh-dur{background:var(--green-light); color:var(--green); border-bottom:2px solid #90c8a8;}
.lh-total{font-family:var(--mono); font-size:13px; font-weight:800;}
.levain-rows{padding:3px 0;}
.levain-row{display:flex; align-items:center; justify-content:space-between; padding:3px 10px; font-size:12px;}
.lr-name{color:#333; font-weight:600;}
.lr-val{font-family:var(--mono); font-weight:700; color:#000;}
.lr-souche{border-bottom:1px solid var(--border);}
.lr-souche .lr-val{color:var(--red); font-weight:800; font-size:13px;}

.recipe-section-title{font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase; color:#555; font-weight:700; padding-bottom:4px; margin:.75rem 0 .4rem; border-bottom:2px solid var(--border-strong);}
.recipe-row{display:grid; grid-template-columns:1fr 1fr; gap:.5rem; margin-bottom:.4rem;}
@media (max-width:700px){.recipe-row{grid-template-columns:1fr;}}

.rcard{background:var(--surface); border:2px solid var(--border-strong); border-radius:var(--r-lg); overflow:hidden;}
.rcard.print-off{opacity:.4;}
.rcard.no-production .rhead{background:#ccc !important;}
.rhead{padding:5px 8px; background:var(--wheat-light); border-bottom:2px solid var(--border-strong); display:flex; align-items:flex-start; justify-content:space-between; gap:.4rem; flex-wrap:wrap;}
.rname{font-size:12px; font-weight:800; color:var(--wheat);}
.rcontrols{display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
.cg{display:flex; align-items:center; gap:3px;}
.cg label{font-size:10px; color:var(--text-muted); font-family:var(--mono); white-space:nowrap; font-weight:600;}
.cg input[type=number]{width:52px; padding:2px 5px; border:2px solid var(--border-strong); border-radius:var(--r); font-family:var(--mono); font-size:12px; font-weight:700; color:var(--wheat); background:#fff; text-align:center;}
.cg input[type=number]:focus{outline:none; border-color:var(--wheat);}
.sportif-cg{border-left:2px solid var(--border-strong); padding-left:6px; margin-left:2px;}
.sportif-cg label{color:var(--green) !important;}
.sportif-cg input{color:var(--green) !important; border-color:var(--green) !important;}

.rmeta{padding:3px 8px; background:#f5f3ef; border-bottom:1px solid var(--border); display:flex; gap:.75rem; flex-wrap:wrap; font-size:10px; font-family:var(--mono);}
.mi .mk{color:var(--text-light); font-weight:600;}
.mi .mv{color:var(--text); font-weight:700;}
.mi .mv.warn{color:var(--amber); font-weight:800;}

.itable{width:100%; border-collapse:collapse; font-size:11px;}
.itable th{font-family:var(--mono); font-size:8.5px; letter-spacing:.06em; text-transform:uppercase; padding:3px 7px; border-bottom:2px solid var(--border-strong); font-weight:700;}
.itable th:first-child{text-align:left; background:#d8d3cc; color:#000;}
.itable th:nth-child(2){text-align:right; background:#d8d3cc; color:#444;}
.itable th:nth-child(3){text-align:right; background:#333; color:#fff;}
.itable tr:nth-child(even){background:#f5f3f0;}
.itable td{padding:4px 7px; border-bottom:1px solid var(--border);}
.itable .td-name{font-weight:600; color:#000; text-align:left;}
.itable .td-base{text-align:right; font-family:var(--mono); font-size:10px; color:#555; background:#eee;}
.itable .td-jour{text-align:right; font-family:var(--mono); font-size:12px; background:#fff;}
.itable .td-jour strong{color:#000; font-weight:800;}
.itable .no-prod{color:#aaa; font-size:9px;}
.itable .tr-total td{border-top:2px solid var(--border-strong);}
.itable .tr-total .td-name{background:#e0dbd4; color:#333; font-size:8px; font-weight:800; text-transform:uppercase;}
.itable .tr-total .td-base{background:#e0dbd4; color:#555; font-weight:600;}
.itable .tr-total .td-jour{background:#e0dbd4;}
.itable .tr-total .td-jour strong{color:#000; font-size:13px; font-weight:800;}
.itable .empois-header td{background:var(--wheat-light); color:var(--wheat); font-size:8px; font-family:var(--mono); letter-spacing:.05em; text-transform:uppercase; padding:2px 7px; font-weight:700;}
.itable .row-empois{background:var(--wheat-light);}
.itable .row-empois .td-name{color:var(--wheat); padding-left:16px; font-style:italic;}
.itable .row-empois .td-base, .itable .row-empois .td-jour{background:var(--wheat-light);}
.itable .row-empois-total .td-name{font-weight:700; font-style:normal;}
.itable .row-sportif td, .itable .row-cran td{background:#e8e8e8; border-top:1px solid #bbb; border-bottom:1px solid #bbb;}
.itable .row-sportif .td-name, .itable .row-cran .td-name{font-weight:800; color:#000;}

.print-cb-wrap{display:flex; align-items:center; gap:4px; margin-left:auto; padding-left:8px;}
.print-cb-wrap input[type=checkbox]{width:15px; height:15px; accent-color:var(--wheat); cursor:pointer;}
.print-cb-wrap label{font-family:var(--mono); font-size:8px; color:var(--text-light); font-weight:600; text-transform:uppercase; cursor:pointer; white-space:nowrap;}

.print-header{display:none;}
.vide{text-align:center; padding:2rem; color:var(--text-light); font-size:.9rem;}
.note-info{font-size:.78rem; color:var(--text-light); margin-bottom:.8rem; font-style:italic;}

#print-select-bar{display:flex; gap:8px; margin-bottom:.7rem; align-items:center;}
.btn-action{padding:6px 12px; border:1.5px solid var(--border-strong); border-radius:var(--r); background:#fff; font-family:var(--mono); font-size:11px; cursor:pointer; color:var(--text-muted);}
.btn-action:hover{border-color:var(--wheat-mid); color:var(--wheat);}

@media print {
  @page { size:A4; margin:8mm; }
  body { background:#fff !important; font-size:10px; color:#000; }
  * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
  .topbar, .qtotals, .no-print, #print-select-bar, .note-info { display:none !important; }
  .rcard.print-off { display:none !important; }
  .rcard.no-production { display:none !important; }
  main { padding:0; max-width:none; }

  /* En-tête de page : plus de fond noir, juste un cadre fin */
  .print-header { display:flex !important; background:#fff !important; color:#000 !important; border:1.2px solid #000; padding:3px 5mm; margin-bottom:4px; align-items:center; justify-content:space-between; gap:8px; }
  .ph-date { font-size:11px; font-weight:800; color:#000 !important; white-space:nowrap; text-transform:uppercase; }
  .ph-totals { display:flex; gap:0; flex:1; justify-content:flex-end; }
  .ph-item { display:flex; flex-direction:column; align-items:center; padding:0 8px; border-left:1px solid #000; }
  .ph-label { font-size:6.5px; text-transform:uppercase; color:#000 !important; }
  .ph-val { font-size:11px; font-weight:800; color:#000 !important; font-family:monospace; }

  /* Layout 2 colonnes via float — fidèle à l'outil original (compat Safari/iPad) */
  .recipe-row { display:block; width:100%; overflow:hidden; margin-bottom:1mm; page-break-inside:avoid; break-inside:avoid; }
  .recipe-row::after { content:""; display:table; clear:both; }
  .recipe-col { float:left; width:48.5%; margin-right:3%; page-break-inside:avoid; break-inside:avoid; }
  .recipe-col:last-child { margin-right:0; }
  .rcard { page-break-inside:avoid !important; break-inside:avoid !important; display:block; width:100%; border:1px solid #000 !important; }

  /* Titres de section : pas de saut systématique ici — la pagination
     est désormais pilotée explicitement par JS via des marqueurs de
     saut de page dédiés (voir .page-break-avant), pour regrouper
     Levains + Pains sucrés sur une page, puis 1 page par famille
     de boulangerie (Baguettes / Blés au levain / Autres céréales). */
  .recipe-section-title.section-vide { display:none !important; }
  .recipe-section-title {
    clear:both; display:block; width:100%;
    font-size:8.5px; font-weight:800; letter-spacing:.1em; text-transform:uppercase; color:#000 !important;
    border-bottom:1.5px solid #000; padding-bottom:2px; margin:1.5mm 0 1mm;
    page-break-after:avoid; break-after:avoid;
  }
  .page-break-avant { page-break-before:always; break-before:page; }

  /* En-tête de carte recette : cadre noir, pas de fond gris */
  .rhead { background:#fff !important; padding:3px 6px; border-bottom:1.2px solid #000; }
  .rname { font-size:10.5px; font-weight:800; color:#000 !important; }
  .cg label { font-size:7.5px; color:#000 !important; font-weight:700; }
  .cg input[type=number] { font-size:9px; font-weight:800; color:#000 !important; background:transparent !important; border:1px solid #000; width:34px; padding:1px 2px; }

  /* Méta-ligne : fond blanc */
  .rmeta { padding:2px 6px; background:#fff !important; font-size:7.5px; border-bottom:1px solid #000; gap:.4rem; }
  .mi .mk { color:#000 !important; font-weight:600; }
  .mi .mv { color:#000 !important; font-weight:800; }

  /* Tableau ingrédients : aucun fond coloré, juste des lignes noires fines */
  .itable { font-size:9px; }
  .itable th { padding:2px 5px; font-size:7.5px; border-bottom:1.2px solid #000; background:#fff !important; color:#000 !important; font-weight:800; }
  .itable th:nth-child(2) { text-align:right; }
  .itable th:nth-child(3) { text-align:right; }
  .itable td { padding:2px 5px; border-bottom:0.6px solid #ccc; background:#fff !important; }
  .itable .td-base { text-align:right; font-size:8.5px; color:#000 !important; }
  .itable .td-jour { font-size:10.5px; background:#fff !important; }
  .itable .td-jour strong { font-weight:800; color:#000 !important; font-size:11.5px; }
  .itable .tr-total td { border-top:1.2px solid #000; background:#fff !important; }
  .itable .tr-total .td-name { font-size:8px; font-weight:800; }

  /* Levains : cadre noir, pas de fond gris/coloré */
  .levains-grid { gap:2mm; margin-bottom:3mm; }
  .levain-card { break-inside:avoid; border:1.2px solid #000 !important; }
  .levain-head { padding:2px 7px; font-size:9.5px; font-weight:800; background:#fff !important; color:#000 !important; border-bottom:1.2px solid #000; }
  .lh-liq, .lh-eng, .lh-dur { background:#fff !important; color:#000 !important; }
  .lh-total { font-size:10px; font-weight:800; color:#000 !important; }
  .levain-row { padding:2px 7px; font-size:9px; }
  .lr-souche { border-bottom:0.6px solid #ccc; }
  .lr-souche .lr-val { font-size:10px; font-weight:800; color:#000 !important; }
  .lr-val { font-size:9px; font-weight:700; color:#000 !important; }

  .print-cb-wrap { display:none !important; }
}
</style>
</head>
<body>

<div class="topbar">
  <span class="marque"><a href="accueil.html" class="retour">←</a> 🌾 PRODUCTION</span>
  <div class="topbar-right">
    <button class="btn-tab active" data-vue="plan" onclick="changerVue('plan')">Plan du jour</button>
    <button class="btn-tab" data-vue="besoins" onclick="changerVue('besoins')">Besoins matières</button>
    <a href="historique-production.html" class="btn-tab" style="text-decoration:none; display:inline-flex; align-items:center;">📊 Historique</a>
    <input type="date" id="date-jour" class="date-input" onchange="chargerTout()">
  </div>
</div>

<main>
  <div class="qtotals" id="qtotals"></div>

  <div class="filtre-metier-bar no-print" id="filtre-metier-bar"></div>

  <div id="vue-plan">
    <div id="print-select-bar" class="no-print">
      <button class="btn-action" onclick="toutSelectionner(true)">☑ Tout sélectionner</button>
      <button class="btn-action" onclick="toutSelectionner(false)">☐ Tout désélectionner</button>
      <button class="btn-action" onclick="resynchroniserDepuisCommandes()">↻ Resynchroniser depuis commandes</button>

    </div>

    <p class="note-info">Cochez les recettes à inclure dans l'export PDF. Les recettes sans production du jour sont automatiquement exclues.</p>

    <div class="levains-grid" id="levains-grid"></div>

    <div class="print-header" id="print-header"></div>

      <div class="vide">Chargement…</div>

  </div>

  <div id="vue-besoins" style="display:none;">
    <div class="card" style="background:var(--surface); border:2px solid var(--border-strong); border-radius:var(--r-lg); overflow:hidden;">
      <div id="liste-besoins"><div class="vide">Chargement…</div></div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script>
let profilCourant = null;
let toutesRecettes = [];
let tousFormats = [];
let toutesVariantes = [];
let planJour = {};
let selectionImpression = {};
let metierFiltre = null; // null = tous les métiers affichés
let recetteIngredientsCache = {};

function fmt(n){ return Math.round(n).toLocaleString('fr-FR'); }
function dateAujourdhui(){ return new Date().toISOString().slice(0,10); }

function changerVue(vue) {
  document.querySelectorAll('.btn-tab').forEach(b => b.classList.toggle('active', b.dataset.vue === vue));
  document.getElementById('vue-plan').style.display = vue === 'plan' ? '' : 'none';
  document.getElementById('vue-besoins').style.display = vue === 'besoins' ? '' : 'none';
  if (vue === 'besoins') chargerBesoins();
}

async function chargerReferentiels() {
  const { data: recs } = await sb.from('recettes').select('*').eq('actif', true).order('ordre_affichage').order('nom');
  toutesRecettes = recs || [];
  const { data: fmts } = await sb.from('recette_formats').select('*').order('ordre');
  tousFormats = fmts || [];
  const { data: vars } = await sb.from('recette_variantes').select('*').order('ordre');
  toutesVariantes = vars || [];
}

async function chargerIngredients() {
  const { data } = await sb.from('recette_ingredients').select('*').order('ordre');
  recetteIngredientsCache = {};
  (data || []).forEach(ing => {
    if (!recetteIngredientsCache[ing.recette_id]) recetteIngredientsCache[ing.recette_id] = [];
    recetteIngredientsCache[ing.recette_id].push(ing);
  });
}

async function chargerPlanJour() {
  const date = document.getElementById('date-jour').value;
  const { data } = await sb.from('production_jour').select('*').eq('date_prod', date);
  planJour = {};
  (data || []).forEach(pj => {
    const cle = `${pj.recette_id}|${pj.format_id || ''}|${pj.variante_id || ''}`;
    planJour[cle] = pj.nb_pieces;
  });
}

function getNbPieces(recetteId, formatId, variantId) {
  const cle = `${recetteId}|${formatId || ''}|${variantId || ''}`;
  return planJour[cle] || 0;
}

async function majProduction(recetteId, formatId, variantId, valeur) {
  const date = document.getElementById('date-jour').value;
  const nbPieces = parseInt(valeur, 10) || 0;
  const cle = `${recetteId}|${formatId || ''}|${variantId || ''}`;
  planJour[cle] = nbPieces;

  const { error } = await sb.rpc('upsert_production_jour', {
    p_date: date, p_recette_id: recetteId,
    p_format_id: formatId || null, p_variante_id: variantId || null,
    p_nb_pieces: nbPieces
  });
  if (error) { console.error('Erreur enregistrement production :', error.message); }

  renderTout();
}

function calculerRecette(recette) {
  const formats = tousFormats.filter(f => f.recette_id === recette.id);
  const variantes = toutesVariantes.filter(v => v.recette_id === recette.id);
  let totalPate = 0, totalPieces = 0;
  const extra = {};

  if (formats.length > 0) {
    formats.filter(f => !f.est_variante_speciale).forEach(f => {
      const n = getNbPieces(recette.id, f.id, null);
      totalPate += n * f.poids_g; totalPieces += n;
    });
    const fmtSpecial = formats.find(f => f.est_variante_speciale);
    if (fmtSpecial) {
      const n = getNbPieces(recette.id, fmtSpecial.id, null);
      totalPate += n * fmtSpecial.poids_g; totalPieces += n;
      extra.special = { format: fmtSpecial, qty: n };
    }
  } else if (variantes.length > 0) {
    const nNature = getNbPieces(recette.id, null, null);
    totalPate += nNature * (recette.poids_piece_g || 0);
    totalPieces += nNature;
    variantes.forEach(v => {
      const nVar = getNbPieces(recette.id, null, v.id);
      const poidsBaseParPiece = v.poids_piece_g / (1 + (v.ratio_ajout_pct || 0) / 100);
      totalPate += nVar * poidsBaseParPiece;
      totalPieces += nVar;
      extra.variante = { v, qty: nVar, ajoutTotal: nVar * (v.poids_piece_g - poidsBaseParPiece) };
    });
  } else {
    const n = getNbPieces(recette.id, null, null);
    totalPate = n * (recette.poids_piece_g || 0);
    totalPieces = n;
  }

  return { totalPate, totalPieces, formats, variantes, extra };
}

function calculerHydratation(ingredients) {
  // Eau totale (y compris la part eau du levain liquide/dur, calculée
  // selon son ratio) / farine totale (y compris la part farine du levain).
  let eau = 0, farine = 0;
  ingredients.forEach(i => {
    const nom = i.nom_affiche.toLowerCase();
    const qte = Number(i.quantite_base_g);
    if (nom === 'levain liquide') {
      eau += qte * 0.5; farine += qte * 0.5;
    } else if (nom === 'levain dur') {
      eau += qte * (1 / 3); farine += qte * (2 / 3);
    } else if (nom === 'levain liquide engrain') {
      eau += qte * 0.5; farine += qte * 0.5;
    } else if (nom.includes('eau')) {
      eau += qte;
    } else if (nom.includes('farine') || nom.includes('seigle') || nom.includes('josette') || nom.includes('engrain')) {
      farine += qte;
    }
  });
  if (farine === 0) return null;
  return Math.round((eau / farine) * 100);
}

function renderCarteRecette(recette) {
  const res = calculerRecette(recette);
  const totalBase = (recetteIngredientsCache[recette.id] || []).reduce((s, i) => s + Number(i.quantite_base_g), 0);
  const coefBrut = totalBase > 0 ? res.totalPate / totalBase : 0;
  // Arrondi au 0.1 supérieur le plus proche (ex: 3.21→3.3, 3.65→3.7)
  const coef = Math.ceil(coefBrut * 10) / 10;
  const hasProd = res.totalPate > 0;
  const nbBacs = recette.poids_bac_g > 0 && res.totalPate > 0 ? Math.ceil(res.totalPate / recette.poids_bac_g) : 0;
  const selectionne = selectionImpression[recette.id] !== false;

  let controlsHtml = '';
  if (res.formats.length > 0) {
    res.formats.filter(f => !f.est_variante_speciale).forEach(f => {
      controlsHtml += `<div class="cg"><label>${f.label}</label><input type="number" min="0" value="${getNbPieces(recette.id, f.id, null) || ''}" onchange="majProduction('${recette.id}','${f.id}',null,this.value)"></div>`;
    });
    const fmtSpecial = res.formats.find(f => f.est_variante_speciale);
    if (fmtSpecial) {
      controlsHtml += `<div class="cg sportif-cg"><label>🏃 ${fmtSpecial.label}</label><input type="number" min="0" value="${getNbPieces(recette.id, fmtSpecial.id, null) || ''}" onchange="majProduction('${recette.id}','${fmtSpecial.id}',null,this.value)"></div>`;
    }
  } else if (res.variantes.length > 0) {
    controlsHtml += `<div class="cg"><label>Nature</label><input type="number" min="0" value="${getNbPieces(recette.id, null, null) || ''}" onchange="majProduction('${recette.id}',null,null,this.value)"></div>`;
    res.variantes.forEach(v => {
      controlsHtml += `<div class="cg sportif-cg"><label>🍒 ${v.nom}</label><input type="number" min="0" value="${getNbPieces(recette.id, null, v.id) || ''}" onchange="majProduction('${recette.id}',null,'${v.id}',this.value)"></div>`;
    });
  } else {
    controlsHtml = `<div class="cg"><label>Qté</label><input type="number" min="0" value="${getNbPieces(recette.id, null, null) || ''}" onchange="majProduction('${recette.id}',null,null,this.value)"></div>`;
  }

  const ingredients = recetteIngredientsCache[recette.id] || [];
  let lignesHtml = ingredients.map(i => {
    const qty = Math.round(Number(i.quantite_base_g) * coef);
    const qtyHtml = hasProd ? `<strong>${fmt(qty)}</strong>` : `<span class="no-prod">—</span>`;

    // Cas particulier : ingrédient marqué explicitement comme sous-recette
    // à détailler (aujourd'hui, uniquement l'Empois du Pain de Mie) — on
    // affiche le détail (farine/eau) plutôt que juste le poids fini.
    // Restreint à sous_recette_label pour ne pas affecter les autres
    // recettes qui utilisent une pâte source (Baguette Maïs, Odette
    // Graines, etc.), qui elles doivent garder leur affichage classique.
    if (i.sous_recette_label && i.recette_source_id && recetteIngredientsCache[i.recette_source_id]) {
      const sousIngredients = recetteIngredientsCache[i.recette_source_id];
      const sousTotalBase = sousIngredients.reduce((s, si) => s + Number(si.quantite_base_g), 0);
      const label = i.sous_recette_label || i.nom_affiche;
      let html = `<tr class="empois-header"><td colspan="3">${label} — à préparer en premier</td></tr>`;
      sousIngredients.forEach(si => {
        // Le coefficient de la sous-recette suit le même ratio que la ligne
        // parente, puisque sa base totale correspond exactement au poids
        // "fini" déclaré dans la recette principale.
        const sousCoef = sousTotalBase > 0 ? qty / sousTotalBase : 0;
        const sousQty = Math.round(Number(si.quantite_base_g) * sousCoef);
        const sousQtyHtml = hasProd ? `<strong>${fmt(sousQty)}</strong>` : `<span class="no-prod">—</span>`;
        html += `<tr class="row-empois"><td class="td-name">${si.nom_affiche}</td><td class="td-base">${fmt(si.quantite_base_g)}</td><td class="td-jour">${sousQtyHtml}</td></tr>`;
      });
      html += `<tr class="row-empois row-empois-total"><td class="td-name">↳ ${label} (total)</td><td class="td-base">${fmt(i.quantite_base_g)}</td><td class="td-jour">${qtyHtml}</td></tr>`;
      return html;
    }

    return `<tr><td class="td-name">${i.nom_affiche}</td><td class="td-base">${fmt(i.quantite_base_g)}</td><td class="td-jour">${qtyHtml}</td></tr>`;
  }).join('');

  if (res.extra.special) {
    const mixQty = res.extra.special.qty * 200;
    lignesHtml += `<tr class="row-sportif"><td class="td-name">🏃 Mélange sportif ×${res.extra.special.qty}</td><td class="td-base">200</td><td class="td-jour"><strong>${fmt(mixQty)}</strong></td></tr>`;
  }
  if (res.extra.variante) {
    const baseParPiece = res.extra.variante.v.poids_piece_g / (1 + (res.extra.variante.v.ratio_ajout_pct || 0) / 100);
    const ajoutParPiece = res.extra.variante.v.poids_piece_g - baseParPiece;
    lignesHtml += `<tr class="row-cran"><td class="td-name">🍒 ${res.extra.variante.v.nom} ×${res.extra.variante.qty}</td><td class="td-base">${fmt(ajoutParPiece)}</td><td class="td-jour"><strong>${fmt(res.extra.variante.ajoutTotal)}</strong></td></tr>`;
  }

  lignesHtml += `<tr class="tr-total"><td class="td-name">TOTAL</td><td class="td-base">${fmt(totalBase)}</td><td class="td-jour">${hasProd ? `<strong>${fmt(res.totalPate)} g</strong>` : '<span class="no-prod">0 pièce</span>'}</td></tr>`;

  return `
    <div class="rcard ${hasProd ? '' : 'no-production'} ${selectionne ? '' : 'print-off'}" data-recette-id="${recette.id}">
      <div class="rhead">
        <span class="rname">${recette.nom}</span>
        <div class="rcontrols">
          ${controlsHtml}
          <div class="print-cb-wrap no-print">
            <input type="checkbox" id="cb-${recette.id}" ${selectionne ? 'checked' : ''} onchange="toggleSelection('${recette.id}', this.checked)">
            <label for="cb-${recette.id}">Imprimer</label>
          </div>
        </div>
      </div>
      <div class="rmeta">
        <span class="mi"><span class="mk">Coef </span><span class="mv">${coef.toFixed(3)}</span></span>
        <span class="mi"><span class="mk">Pâte </span><span class="mv">${fmt(res.totalPate)} g</span></span>
        <span class="mi"><span class="mk">Bacs </span><span class="mv ${nbBacs > 3 ? 'warn' : ''}">${nbBacs > 0 ? nbBacs + ' bac' + (nbBacs > 1 ? 's' : '') : '—'}</span></span>
        <span class="mi"><span class="mk">Pièces </span><span class="mv">${res.totalPieces > 0 ? res.totalPieces : '—'}</span></span>
        ${res.formats.length === 0 && recette.poids_piece_g ? `<span class="mi"><span class="mk">Poids </span><span class="mv">${fmt(recette.poids_piece_g)}${recette.poids_cuit_g ? ' → ' + fmt(recette.poids_cuit_g) : ''} g/pce</span></span>` : ''}
        ${calculerHydratation(ingredients) !== null ? `<span class="mi"><span class="mk">Hydratation </span><span class="mv">${calculerHydratation(ingredients)}%</span></span>` : ''}
      </div>
      ${res.formats.length > 0 ? `
      <div class="rmeta" style="background:#fbfaf8; font-size:9px;">
        ${res.formats.map(f => `<span class="mi"><span class="mk">${f.label} </span><span class="mv">${fmt(f.poids_g)}${f.poids_cuit_g ? ' → ' + fmt(f.poids_cuit_g) : ''} g</span></span>`).join('')}
      </div>` : ''}
      <table class="itable">
        <thead><tr><th>Ingrédient</th><th>Base</th><th>Jour</th></tr></thead>
        <tbody>${lignesHtml}</tbody>
      </table>
    </div>`;
}

function toggleSelection(recetteId, checked) {
  selectionImpression[recetteId] = checked;
  renderTout();
}
function toutSelectionner(val) {
  toutesRecettes.forEach(r => selectionImpression[r.id] = val);
  renderTout();
}

const labelsMetierFiltre = { B: 'Boulangerie', V: 'Viennoiserie', GV: 'Gâteaux de voyage', P: 'Pâtisserie' };

function renderFiltreMetier() {
  const conteneur = document.getElementById('filtre-metier-bar');
  if (!conteneur) return;

  const compteParMetier = {};
  toutesRecettes.forEach(r => { compteParMetier[r.metier] = (compteParMetier[r.metier] || 0) + 1; });
  const metiersPresents = Object.keys(compteParMetier).filter(m => labelsMetierFiltre[m]);

  if (metiersPresents.length <= 1) { conteneur.innerHTML = ''; return; }

  let html = `<button class="filtre-metier-btn ${metierFiltre === null ? 'active' : ''}" onclick="basculerFiltreMetier(null)">Tous</button>`;
  metiersPresents.forEach(m => {
    html += `<button class="filtre-metier-btn ${metierFiltre === m ? 'active' : ''}" onclick="basculerFiltreMetier('${m}')">${labelsMetierFiltre[m]}<span class="count">${compteParMetier[m]}</span></button>`;
  });
  conteneur.innerHTML = html;
}

function basculerFiltreMetier(metier) {
  metierFiltre = metier;
  renderTout();
}

function renderTout() {
  const zone = document.getElementById('zone-recettes');
  if (toutesRecettes.length === 0) { zone.innerHTML = '<div class="vide">Aucune recette active.</div>'; return; }

  renderFiltreMetier();

  const parMetier = { B: [], V: [], GV: [], P: [] };
  toutesRecettes.forEach(r => { if (parMetier[r.metier]) parMetier[r.metier].push(r); });
  // Si un métier est sélectionné, on n'affiche QUE celui-là (économie
  // d'écran et de manipulation quand on n'a besoin que d'un seul métier
  // à l'instant — ex: le boulanger qui n'a pas à voir Pâtisserie/Viennoiserie).
  const metiersAffiches = metierFiltre ? [metierFiltre] : ['B', 'V', 'GV', 'P'];
  const labelsMetier = { B: 'Boulangerie', V: 'Viennoiserie', GV: 'Gâteaux de voyage', P: 'Pâtisserie' };
  const labelsFamille = {
    baguettes: 'Baguettes', bles_levain: 'Blés au levain',
    autres_cereales_levain: 'Autres céréales au levain', pains_sucres: 'Pains sucrés'
  };
  // Ordre demandé pour l'impression quotidienne (Boulangerie en priorité) :
  // Page 1 = Levains (déjà avant dans le HTML) + Pains sucrés
  // Page 2 = Baguettes
  // Page 3 = Blés au levain
  // Page 4 = Autres céréales au levain
  const ordreFamilles = ['pains_sucres', 'baguettes', 'bles_levain', 'autres_cereales_levain'];
  // Familles qui doivent démarrer une NOUVELLE page (pains_sucres reste
  // sur la même page que les levains, donc pas de saut avant elle).
  const famillesAvecSautPage = new Set(['baguettes', 'bles_levain', 'autres_cereales_levain']);

  function renderGroupeRecettes(recs) {
    let h = '';
    for (let i = 0; i < recs.length; i += 2) {
      h += '<div class="recipe-row">';
      h += `<div class="recipe-col">${renderCarteRecette(recs[i])}</div>`;
      if (recs[i + 1]) h += `<div class="recipe-col">${renderCarteRecette(recs[i + 1])}</div>`;
      else h += `<div class="recipe-col recipe-col-empty"></div>`;
      h += '</div>';
    }
    return h;
  }

  let html = '';
  let totalPateGlobal = 0, totalPiecesGlobal = 0;

  metiersAffiches.forEach(metier => {
    const recs = parMetier[metier];
    if (recs.length === 0) return;
    const sectionVide = recs.every(r => calculerRecette(r).totalPate === 0);
    // Saut de page avant Viennoiserie/Gâteaux de voyage/Pâtisserie (qui
    // n'ont pas de sous-familles) ; pas avant Boulangerie elle-même,
    // car ses sous-familles gèrent déjà leurs propres sauts.
    const classeSection = metier !== 'B' ? 'page-break-avant' : '';
    html += `<div class="recipe-section-title ${sectionVide ? 'section-vide' : ''} ${classeSection}">${labelsMetier[metier]}</div>`;

    if (metier === 'B') {
      const parFamille = {};
      const sansFamille = [];
      recs.forEach(r => {
        if (r.famille) { (parFamille[r.famille] = parFamille[r.famille] || []).push(r); }
        else sansFamille.push(r);
      });
      ordreFamilles.forEach(fam => {
        if (parFamille[fam] && parFamille[fam].length > 0) {
          const famVide = parFamille[fam].every(r => calculerRecette(r).totalPate === 0);
          const classeSaut = famillesAvecSautPage.has(fam) ? 'page-break-avant' : '';
          html += `<div class="recipe-section-title ${famVide ? 'section-vide' : ''} ${classeSaut}" style="font-size:8px; opacity:.75; margin-top:.5rem; border-bottom-style:dashed;">↳ ${labelsFamille[fam]}</div>`;
          html += renderGroupeRecettes(parFamille[fam]);
        }
      });
      if (sansFamille.length > 0) {
        const sfVide = sansFamille.every(r => calculerRecette(r).totalPate === 0);
        html += `<div class="recipe-section-title ${sfVide ? 'section-vide' : ''} page-break-avant" style="font-size:8px; opacity:.75; margin-top:.5rem; border-bottom-style:dashed;">↳ Sans famille</div>`;
        html += renderGroupeRecettes(sansFamille);
      }
    } else {
      html += renderGroupeRecettes(recs);
    }
  });
  zone.innerHTML = html;

  toutesRecettes.forEach(r => {
    const res = calculerRecette(r);
    totalPateGlobal += res.totalPate;
    totalPiecesGlobal += res.totalPieces;
  });

  document.getElementById('qtotals').innerHTML = `
    <div class="qtot"><div class="ql">Pâte totale</div><div class="qv">${(totalPateGlobal/1000).toFixed(1)}</div><div class="qu">kg</div></div>
    <div class="qtot"><div class="ql">Pièces totales</div><div class="qv">${totalPiecesGlobal}</div><div class="qu">pces</div></div>
  `;

  const dateAffichee = new Date(document.getElementById('date-jour').value).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });
  document.getElementById('print-header').innerHTML = `
    <span class="ph-date">${dateAffichee}</span>
    <div class="ph-totals">
      <div class="ph-item"><span class="ph-label">Pâte</span><span class="ph-val">${(totalPateGlobal/1000).toFixed(1)} kg</span></div>
      <div class="ph-item"><span class="ph-label">Pièces</span><span class="ph-val">${totalPiecesGlobal}</span></div>
    </div>`;

  renderLevains();
}

async function renderLevains() {
  const date = document.getElementById('date-jour').value;
  const { data, error } = await sb.rpc('get_besoins_levains', { p_date: date });
  const grid = document.getElementById('levains-grid');
  if (error || !data || data.length === 0) { grid.innerHTML = ''; return; }

  const classes = { liquide: 'lh-liq', liquide_engrain: 'lh-eng', dur: 'lh-dur' };

  grid.innerHTML = data.map(l => {
    const rows = `
      <div class="levain-row lr-souche"><span class="lr-name">Souche</span><span class="lr-val">${fmt(l.souche_g)} g</span></div>
      <div class="levain-row"><span class="lr-name">Farine rafraîchi</span><span class="lr-val">${fmt(l.total_farine_g)} g</span></div>
      <div class="levain-row"><span class="lr-name">Eau rafraîchi</span><span class="lr-val">${fmt(l.total_eau_g)} g</span></div>
    `;
    return `
      <div class="levain-card">
        <div class="levain-head ${classes[l.type] || ''}">
          <span>${l.nom}</span><span class="lh-total">${fmt(l.total_g)} g</span>
        </div>
        <div class="levain-rows">${rows}</div>
      </div>`;
  }).join('');
}

async function resynchroniserDepuisCommandes() {
  const date = document.getElementById('date-jour').value;
  const { data, error } = await sb.rpc('get_demande_par_recette', { p_date: date });
  if (error) { alert('Erreur : ' + error.message); return; }
  if (!data || data.length === 0) { alert('Aucune commande structurée trouvée pour ce jour.'); return; }

  for (const ligne of data) {
    const { error: errUpsert } = await sb.rpc('upsert_production_jour', {
      p_date: date, p_recette_id: ligne.recette_id,
      p_format_id: ligne.format_id || null, p_variante_id: ligne.variante_id || null,
      p_nb_pieces: ligne.qte_commandee
    });
    if (errUpsert) console.error('Erreur resynchro pour', ligne.nom_recette, ':', errUpsert.message);
  }
  await chargerPlanJour();
  renderTout();
  alert('Plan resynchronisé avec les commandes du jour.');
}

async function chargerBesoins() {
  const date = document.getElementById('date-jour').value;
  const { data, error } = await sb.rpc('get_besoins_matieres', { p_date_debut: date, p_date_fin: date });
  const conteneur = document.getElementById('liste-besoins');
  if (error) { conteneur.innerHTML = `<div class="vide">Erreur : ${error.message}</div>`; return; }
  if (!data || data.length === 0) { conteneur.innerHTML = '<div class="vide">Aucun besoin calculé.</div>'; return; }
  data.sort((a, b) => a.nom_matiere.localeCompare(b.nom_matiere));
  conteneur.innerHTML = `<table class="itable" style="font-size:13px;"><thead><tr><th>Matière</th><th></th><th>Quantité</th></tr></thead><tbody>` +
    data.map(b => `<tr><td class="td-name">${b.nom_matiere}${b.bio ? ' 🌱' : ''}</td><td></td><td class="td-jour"><strong>${b.quantite_totale_kg} kg</strong></td></tr>`).join('') +
    `</tbody></table>`;
}

async function exporterPDF() {
  if (typeof html2canvas === 'undefined' || typeof window.jspdf === 'undefined') {
    alert("Les librairies d'export PDF ne sont pas chargées (vérifiez la connexion internet)."); return;
  }

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('p', 'mm', 'a4');
  const pageW = 210, pageH = 297, margin = 10;
  const contentW = pageW - margin * 2;

  const date = document.getElementById('date-jour').value;
  const dateAffichee = new Date(date).toLocaleDateString('fr-FR', { weekday:'long', day:'numeric', month:'long' });

  let currentY = margin;
  let estPremierElement = true;

  function ajouterEnTetePage() {
    pdf.setFillColor(107, 58, 31);
    pdf.rect(margin, margin, contentW, 9, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(10);
    pdf.setFont('helvetica', 'bold');
    pdf.text('Production — ' + dateAffichee, margin + 3, margin + 6);
    currentY = margin + 13;
  }

  ajouterEnTetePage();

  // Liste des éléments à capturer : grille des levains, puis chaque
  // titre de section/famille (pour forcer un saut de page), puis
  // chaque carte recette sélectionnée pour l'impression.
  const elements = [
    document.getElementById('levains-grid'),
    ...document.querySelectorAll('#zone-recettes .recipe-section-title, #zone-recettes .rcard')
  ].filter(Boolean).filter(el => !el.classList?.contains('print-off') && !el.classList?.contains('section-vide') && el.offsetHeight > 0);

  for (let i = 0; i < elements.length; i++) {
    const el = elements[i];
    const doitSauterPage = el.classList.contains('page-break-avant');

    // Saut de page UNIQUEMENT là où le marqueur page-break-avant a été
    // posé (Baguettes / Blés au levain / Autres céréales / Viennoiserie
    // etc.) — pas avant chaque titre, pour garder Levains + Pains sucrés
    // groupés sur la première page comme demandé.
    if (doitSauterPage && !estPremierElement) {
      pdf.addPage();
      ajouterEnTetePage();
    }

    try {
      const canvas = await html2canvas(el, { scale: 2, backgroundColor: '#ffffff', logging: false });
      const imgData = canvas.toDataURL('image/png');
      const imgW = contentW;
      const imgH = (canvas.height * imgW) / canvas.width;

      if (currentY + imgH > pageH - margin) {
        pdf.addPage();
        ajouterEnTetePage();
      }

      pdf.addImage(imgData, 'PNG', margin, currentY, imgW, imgH);
      currentY += imgH + 2;
      estPremierElement = false;
    } catch (err) {
      console.warn('Erreur capture élément PDF :', err);
    }
  }

  pdf.save(`production-${date}.pdf`);
}

async function chargerTout() {
  await chargerPlanJour();
  renderTout();
}

(async () => {
  profilCourant = await exigerConnexion();
  if (!profilCourant) return;
  document.getElementById('date-jour').value = dateAujourdhui();
  await chargerReferentiels();
  await chargerIngredients();
  await chargerPlanJour();
  renderTout();
})();
</script>
