<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pain Nature — Accueil</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#6b3a1f">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/shared.css">
<style>
.topbar{
  background:var(--wheat); color:#fff; padding:0 1.2rem; height:54px;
  display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
.topbar .marque{font-weight:800; font-size:1rem;}
.topbar .deco{
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
  color:#fff; padding:6px 13px; border-radius:var(--r); font-size:.82rem; font-weight:600;
  cursor:pointer;
}
main{max-width:640px; margin:2rem auto; padding:0 1.2rem;}
.bienvenue{
  text-align:center; padding:2rem 1rem;
}
.menu-grille{
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:1.5rem;
}
.menu-item{
  background:var(--surface); border:1.5px solid var(--border); border-radius:var(--r-lg);
  padding:1.3rem 1rem; text-align:center; text-decoration:none; color:var(--text);
  box-shadow:var(--shadow); transition:transform .1s;
}
.menu-item:active{transform:scale(.97);}
.menu-item.pleine-largeur{grid-column:1 / -1;}
.menu-item .emoji{font-size:1.8rem; display:block; margin-bottom:.5rem;}
.menu-item .label{font-weight:700; font-size:.88rem;}
.notif-badge{
  position:absolute; top:8px; right:8px; background:var(--red); color:#fff;
  font-size:.68rem; font-weight:800; font-family:var(--mono);
  min-width:19px; height:19px; border-radius:10px; display:flex; align-items:center; justify-content:center;
  padding:0 4px; box-shadow:0 2px 4px rgba(0,0,0,.25);
}
.bienvenue .role-badge{
  display:inline-block; background:var(--wheat-light); color:var(--wheat);
  padding:4px 14px; border-radius:20px; font-size:.78rem; font-weight:700;
  font-family:var(--mono); text-transform:uppercase; letter-spacing:.04em;
  margin-top:.6rem;
}
.bienvenue h2{font-size:1.5rem; margin-top:.8rem; color:var(--text);}
.note{
  margin-top:2rem; padding:1.2rem; border-radius:var(--r-lg);
  background:var(--wheat-light); color:var(--wheat); font-size:.88rem; text-align:center;
}
</style>
</head>
<body>

<div class="topbar">
  <span class="marque">🌾 PAIN NATURE</span>
  <button class="deco" onclick="deconnexion()">Déconnexion</button>
</div>

<main>
  <div class="card bienvenue">
    <h2 id="texte-bienvenue">Connexion en cours…</h2>
    <span class="role-badge" id="badge-role"></span>
  </div>

  <div class="menu-grille" id="menu-grille"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase-client.js"></script>
<script>
(async () => {
  const profil = await exigerConnexion();
  if (!profil) return;

  const labelsRole = {
    gerant: 'Gérant', boulanger: 'Boulanger', patissier: 'Pâtissier',
    vendeur: 'Vendeur', apprenti: 'Apprenti'
  };

  document.getElementById('texte-bienvenue').textContent = `Bonjour ${profil.prenom || profil.nom} 👋`;
  document.getElementById('badge-role').textContent = labelsRole[profil.role] || profil.role;

  const items = [
    // Ligne 1 : Commandes seule (pleine largeur)
    { href: 'commandes.html', emoji: '📋', label: 'Commandes', roles: ['gerant','boulanger','patissier','vendeur','apprenti'], pleine: true },
    // Ligne 2 : Matières premières + Production
    { href: 'matieres-premieres.html', emoji: '🌾', label: 'Matières premières', roles: ['gerant','boulanger','patissier'] },
    { href: 'production.html', emoji: '🥖', label: 'Production', roles: ['gerant','boulanger','patissier','vendeur','apprenti'] },
    // Ligne 3 : Gestion seule (pleine largeur)
    { href: 'gestion.html', emoji: '📖', label: 'Gestion', roles: ['gerant'], pleine: true },
    // Ligne 4 : Traçabilité + Historique
    { href: 'tracabilite.html', emoji: '🌿', label: 'Traçabilité', roles: ['gerant','boulanger','patissier','vendeur','apprenti'] },
    { href: 'historique-production.html', emoji: '📊', label: 'Historique', roles: ['gerant','boulanger','patissier'] },
    // Ligne 5 : Transmissions + Équipe
    { href: 'transmissions.html', emoji: '📝', label: 'Transmissions', roles: ['gerant','boulanger','patissier','vendeur','apprenti'], id: 'item-transmissions' },
    { href: 'equipe.html', emoji: '👥', label: 'Équipe', roles: ['gerant'] },
  ];

  const grille = document.getElementById('menu-grille');
  grille.innerHTML = items
    .filter(i => i.roles.includes(profil.role))
    .map(i => `<a class="menu-item ${i.pleine ? 'pleine-largeur' : ''}" href="${i.href}" ${i.id ? `id="${i.id}"` : ''} style="position:relative;"><span class="emoji">${i.emoji}</span><span class="label">${i.label}</span></a>`)
    .join('');

  // Notification : transmissions non traitées adressées à la personne
  // connectée, ou à toute l'équipe (destinataire_id null).
  const { count } = await sb
    .from('transmissions')
    .select('id', { count: 'exact', head: true })
    .eq('traite', false)
    .or(`destinataire_id.eq.${profil.id},destinataire_id.is.null`);

  if (count > 0) {
    const itemTransmissions = document.getElementById('item-transmissions');
    if (itemTransmissions) {
      itemTransmissions.insertAdjacentHTML('beforeend', `<span class="notif-badge">${count > 9 ? '9+' : count}</span>`);
    }
  }
})();
</script>
</body>
</html>
